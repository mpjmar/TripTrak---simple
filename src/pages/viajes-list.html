<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="TripTrakker: un planificador de viajes conexión a MySQL"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="M. Paz Jiménez Martín" />
    <title>
      TripTrakker: un planificador de viajes conexión a MySQL con JavaScript y
      servidor Node.js
    </title>
    <link rel="icon" type="image/x-icon" href="./assets/images/MySQL.svg" />
    <meta name="keywords" content="HTML5, CSS3, diseño web" />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="../css/estilos.css" />
  </head>

  <body>
    <header>
      <h1>Triptrakker</h1>
    </header>

    <main>
      <nav class="panel-lateral">
          <h2>Filtros</h2>

          <button id="boton-buscar-todos" class="boton-filtro">
            Mostrar todos los viajes
          </button>

          <button id="boton-busqueda-por-ciudad" class="boton-filtro">
            Buscar viajes por país
          </button>

          <button id="boton-insertar-viaje" class="boton-filtro">
            Insertar un viaje
          </button>
          
          <button id="boton-actualizar-viaje" class="boton-filtro">
            Actualizar un viaje
          </button>

          <button id="boton-eliminar-viaje" class="boton-filtro">
            Eiminar un viaje
          </button>

      </nav>

      <div class="contenido-principal">
        <h1>Todos los viajes</h1>
        <div id="lista-viajes" class="contenedor-grid"></div>
      </div>

    </main>

    <footer>
      <p>
        TripTrakker: un planificador de viajes conexión a MySQL con JavaScript y
        servidor Node.js
      </p>
      <p>Una aplicación creada por una viajera para viajeros independientes.</p>
    </footer>

    <script src="assets/js/javascript.js"></script>
  </body>
</html>
