<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="TripTrakker: un planificador de viajes conexión a MySQL"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="M. Paz Jiménez Martín" />
    <title>Alojamientos</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/MySQL.svg" />
    <meta name="keywords" content="HTML5, CSS3, diseño web" />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="./css/estilos.css" />
  </head>

  <body>
    <header>
      <h1>Alojamientos</h1>
    </header>
        <main>
            <div class="panel-lateral">

                <div class="contenedor-BD">
                    <img src="./assets/images/SQL_Database.svg" alt="Base de Datos" class="imagen-BD">
                    <h2>Viajes</h2>
                </div>

                <div class="contenedor-filtros">
                    <img src="./assets/images/filters.png" alt="Filtros" class="imagen-filtros">
                    <h2>Filtros</h2>
                </div>

                <input type="text" id="busquedapordestino" placeholder="Buscar por destino...">

                <button id="botonbuscartodo" class="boton-filtro">
                    <img src="./assets/images/viajes.png" alt="Mostrar todos" class="imagen-boton">
                    Mostrar todos los viajes
                </button>

                <button id="botonbusquedaporciudad" class="boton-filtro">
                    <img src="./assets/images/buscar.png" alt="Buscar por ciudad" class="imagen-boton">
                    Buscar viajes por ciudad
                </button>

                <button id="botoninsertarviaje" class="boton-filtro">
                    <img src="./assets/images/agregar-viaje.png" alt="Insertar un viaje" class="imagen-boton">
                    Insertar un viaje
                </button>

                <button id="botoneliminarviaje" class="boton-filtro">
                    <img src="./assets/images/borrar-viaje.png" alt="Eiminar un viaje" class="imagen-boton">
                    Eiminar un viaje
                </button>

                <button id="botonactualizarviaje" class="boton-filtro">
                    <img src="./assets/images/editar-viaje.png" alt="Actualizar un viaje" class="imagen-boton">
                    Actualizar un viaje
                </button>
            </div>

            <div class="contenido-principal">
                <h1>Usuarios recuperados</h1>
                <div id="mensajesalida" class="contenedor-grid"></div>
            </div>
        </main>

    <footer>
      <p>
        TripTrakker: un planificador de viajes conexión a MySQL con JavaScript y
        servidor Node.js
      </p>
      <p>Una aplicación creada por una viajera para viajeros independientes.</p>
    </footer>

    <script src="./js/javascript.js"></script>
  </body>
</html>
