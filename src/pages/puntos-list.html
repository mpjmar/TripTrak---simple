<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="TripTrakker: un planificador de viajes conexión a MySQL"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="M. Paz Jiménez Martín" />
    <title>Puntos de interés</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/MySQL.svg" />
    <meta name="keywords" content="HTML5, CSS3, diseño web" />
    <meta name="robots" content="index, follow" />
    <link rel="stylesheet" href="./css/estilos.css" />
  </head>

  <body>
    <header>
      <h1>Puntos de interés</h1>
    </header>
        <main>
            <div class="panel-lateral">

                <div class="contenedor-BD">
                    <img src="./assets/images/SQL_Database.svg" alt="Base de Datos" class="imagen-BD">
                    <h2>Puntos de interés</h2>
                </div>

                <div class="contenedor-filtros">
                    <img src="./assets/images/filters.png" alt="Filtros" class="imagen-filtros">
                    <h2>Filtros</h2>
                </div>

                <input type="text" id="busquedapordestino" placeholder="Buscar por destino...">

                <button id="btn-puntos-interes" class="boton-filtro">
                    <img src="./assets/images/puntos-interes.png" alt="Puntos de interés" class="imagen-boton">
                    Puntos de interés
                </button>

                <button id="btn-alojamientos" class="boton-filtro">
                    <img src="./assets/images/alojamientos.png" alt="Alojamientos" class="imagen-boton">
                    Alojamientos
                </button>

                <button id="btn-notas" class="boton-filtro">
                    <img src="./assets/images/notas.png" alt="Notas" class="imagen-boton">
                    Notas
                </button>

                <button id="btn-info-dest" class="boton-filtro">
                    <img src="./assets/images/info-dest.png" alt="Info destino" class="imagen-boton">
                    Información sobre el destino
                </button>

                <button id="btn-calendario" class="boton-filtro">
                    <img src="./assets/images/calendario.png" alt="Calendario" class="imagen-boton">
                    Calendario
                </button>
            </div>

            <div class="contenido-principal">
                <h1>Viaje</h1>
                <div id="mensajesalida" class="contenedor-grid"></div>
            </div>
        </main>

    <footer>
      <p>
        TripTrakker: un planificador de viajes conexión a MySQL con JavaScript y
        servidor Node.js
      </p>
      <p>Una aplicación creada por una viajera para viajeros independientes.</p>
    </footer>

    <script src="./js/javascript.js"></script>
  </body>
</html>
